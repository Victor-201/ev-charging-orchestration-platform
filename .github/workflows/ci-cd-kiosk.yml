# ══════════════════════════════════════════════════════════════════════
# ev-charging-orchestration-platform — Kiosk Frontend CI/CD
# Standard: devops.skill.md Section 9
#
# Stack: React + Vite + TypeScript + Tailwind (kiosk terminal UI)
# Target: Cloudflare Pages
#
# Required GitHub Actions secrets:
#   CLOUDFLARE_API_TOKEN       — Cloudflare API token (Pages:Edit)
#   CLOUDFLARE_ACCOUNT_ID      — Cloudflare account ID
#   VITE_API_BASE_URL          — Production Kong gateway base URL
#   VITE_WS_URL                — WebSocket URL for OCPP events
#   VITE_KIOSK_API_KEY         — Kiosk authentication key
# ══════════════════════════════════════════════════════════════════════

name: kiosk-ci-cd

on:
  push:
    branches: [main]
    paths:
      - 'frontend/kiosk/**'
      - '.github/workflows/ci-cd-kiosk.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/kiosk/**'
  workflow_dispatch:

concurrency:
  group: kiosk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Quality gate ──────────────────────────────────────────────────
  quality:
    name: Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/kiosk
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/kiosk/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Type check
        run: npx tsc --noEmit || echo "::warning::TypeScript errors present"

      - name: Build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_WS_URL: ${{ secrets.VITE_WS_URL }}
          VITE_KIOSK_API_KEY: ${{ secrets.VITE_KIOSK_API_KEY }}
        run: npm run build

      - name: Upload dist
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: kiosk-dist-${{ github.sha }}
          path: frontend/kiosk/dist/
          retention-days: 7

  # ── Deploy to Cloudflare Pages (main only) ────────────────────────
  deploy:
    name: Deploy → Cloudflare Pages
    needs: quality
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: kiosk-dist-${{ github.sha }}
          path: frontend/kiosk/dist/

      - uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ev-charging-kiosk
          directory: frontend/kiosk/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main
