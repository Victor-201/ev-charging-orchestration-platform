# ══════════════════════════════════════════════════════════════════════
# ev-charging-orchestration-platform — Web Admin CI/CD
# Standard: devops.skill.md Section 9
#
# Stack: Next.js 14 + TypeScript + Tailwind v3
# Target: Vercel (Hobby — optimal for Next.js, free for non-commercial)
#
# Required GitHub Actions secrets:
#   VERCEL_TOKEN          — Vercel personal access token
#   VERCEL_ORG_ID         — from `vercel link` (stored in .vercel/project.json)
#   VERCEL_PROJECT_ID     — from `vercel link`
#   NEXT_PUBLIC_API_URL   — Production Kong gateway base URL
#   NEXT_PUBLIC_WS_URL    — WebSocket URL (for real-time charging events)
# ══════════════════════════════════════════════════════════════════════

name: web-admin-ci-cd

on:
  push:
    branches: [main]
    paths:
      - 'frontend/web-admin/**'
      - '.github/workflows/ci-cd-web-admin.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/web-admin/**'
  workflow_dispatch:

concurrency:
  group: web-admin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Quality gate ──────────────────────────────────────────────────
  quality:
    name: Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/web-admin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/web-admin/package-lock.json

      - run: npm ci

      - name: Lint (Next.js lint)
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build (verify)
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_WS_URL: ${{ secrets.NEXT_PUBLIC_WS_URL }}
        run: npm run build

  # ── Deploy to Vercel (main only) ──────────────────────────────────
  deploy:
    name: Deploy → Vercel
    needs: quality
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/web-admin/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        working-directory: frontend/web-admin
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build via Vercel
        working-directory: frontend/web-admin
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        working-directory: frontend/web-admin
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Verify deployment
        run: |
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.NEXT_PUBLIC_API_URL }}/health" || echo "000")
          echo "API gateway status: $STATUS"
